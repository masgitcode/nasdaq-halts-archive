name: Daily Halt Ingest

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Optional ET target date in YYYY-MM-DD'
        required: false
        type: string

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Run tests
        run: npm test

      - name: Run daily ingest
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            node src/ingest-day.js --date "${{ inputs.date }}"
          else
            node src/ingest-day.js
          fi

      - name: Commit database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/halts.sqlite
          if git diff --cached --quiet; then
            echo "No database changes to commit."
            exit 0
          fi

          if [ -n "${{ inputs.date }}" ]; then
            COMMIT_MESSAGE="archive halts for ${{ inputs.date }}"
          else
            COMMIT_MESSAGE="archive halts for $(date -u +%F)"
          fi

          git commit -m "$COMMIT_MESSAGE"
          git push
